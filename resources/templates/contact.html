<section id="contact" class="section-padding section-dark overflow-hidden">
  <div class="container">
    <div class="row g-5 align-items-center">
      <!-- Left Column: Contact Info -->
      <div class="col-lg-5 reveal">
        <div class="contact-meta-badge mb-3">
          <i class="bi bi-clock-history"></i>
          <span>Typical response: &lt; 24 hours</span>
        </div>
        <h2 class="section-title">Get in Touch</h2>
        <h3 class="display-6 fw-bold mb-4">Let's discuss your next <span class="text-blue">big idea.</span></h3>
        <p class="section-text mb-5">
          I'm always open to discussing new projects, creative ideas, or opportunities to be part of your vision.
        </p>

        <div class="contact-methods-v2">
          <div class="method-item-v2">
            <span class="method-label-v2">Direct Mail</span>
            <button class="method-value-v2 btn-copy-email" data-email="e.luis.pelaez@gmail.com">e.luis.pelaez@gmail.com</button>
          </div>
          <div class="method-item-v2">
            <span class="method-label-v2">Instant Message</span>
            <a href="https://wa.me/639764274590" target="_blank" class="method-value-v2">+63 976 427 4590</a>
          </div>
        </div>
      </div>

      <!-- Right Column: Contact Form -->
      <div class="col-lg-7 reveal reveal-delay-1">
        <div class="contact-glass-card">
          <form
            class="contact-form-v2"
            action="mailto:e.luis.pelaez@gmail.com"
            method="POST"
            enctype="text/plain"
          >
            <div class="row g-4">
              <div class="col-md-6">
                <div class="form-group-v2">
                  <label for="contact-name"><i class="bi bi-person-fill"></i> Full Name</label>
                  <input type="text" id="contact-name" name="name" placeholder="John Doe" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-group-v2">
                  <label for="contact-email"><i class="bi bi-envelope-fill"></i> Email Address</label>
                  <input type="email" id="contact-email" name="email" placeholder="john@example.com" required>
                </div>
              </div>
              <div class="col-12">
                <div class="form-group-v2">
                  <label for="contact-subject"><i class="bi bi-chat-left-dots-fill"></i> Subject</label>
                  <input type="text" id="contact-subject" name="subject" placeholder="Project Inquiry" required>
                </div>
              </div>
              <div class="col-12">
                <div class="form-group-v2">
                  <label for="contact-message"><i class="bi bi-pencil-fill"></i> Message</label>
                  <textarea id="contact-message" name="body" rows="5" placeholder="Tell me about your project..." required></textarea>
                </div>
              </div>
              <div class="col-12">
                <button type="submit" class="contact-btn-v2">
                  <span>Send Message</span>
                  <i class="bi bi-send-fill"></i>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
